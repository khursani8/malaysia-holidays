<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="512" height="512" rx="120" fill="url(#gradient)"/>

  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EE5A6F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Calendar Icon -->
  <rect x="100" y="80" width="312" height="352" rx="20" fill="white" opacity="0.95"/>

  <!-- Calendar Header -->
  <rect x="100" y="80" width="312" height="100" rx="20" fill="#EE5A6F"/>
  <rect x="100" y="160" width="312" height="20" fill="#EE5A6F"/>

  <!-- Calendar Rings -->
  <circle cx="160" cy="60" r="24" fill="white"/>
  <circle cx="352" cy="60" r="24" fill="white"/>
  <circle cx="160" cy="60" r="12" fill="#EE5A6F"/>
  <circle cx="352" cy="60" r="12" fill="#EE5A6F"/>

  <!-- Holiday Text -->
  <text x="256" y="330" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#6C5CE7" text-anchor="middle">MY</text>
  <text x="256" y="380" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="#FF9F43" text-anchor="middle">HOLIDAYS</text>

  <!-- Star decoration -->
  <path d="M420 140 L428 165 L454 165 L433 180 L441 205 L420 190 L399 205 L407 180 L386 165 L412 165 Z" fill="#FFD700"/>
</svg>
